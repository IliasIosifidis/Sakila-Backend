# Database ? env vars with localhost defaults for local dev
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/sakila}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:yourLocalPassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Elasticsearch
spring.elasticsearch.uris=${ELASTICSEARCH_URI:http://localhost:9200}

# Hibernate ? keep validate for production, fall back to update for dev if needed
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

# Disable show-sql in production
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Actuator health endpoint exposed for Railway healthchecks
management.endpoints.web.exposure.include=health